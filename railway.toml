[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
healthcheckPath = "/route/v1/driving/-65.42,-24.78;-65.41,-24.79?overview=false"
healthcheckTimeout = 2400

# Runtime Salta: ~512–1024 MB. Subir a 2147483648 solo con FORCE_REBUILD=true.
[deploy.limitOverride.containers]
memoryBytes = 1073741824
cpu = 1
