[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
healthcheckPath = "/route/v1/driving/-65.42,-24.78;-65.41,-24.79?overview=false"
healthcheckTimeout = 3600

# osmium extract del PBF Argentina (~439 MB) necesita ~3–4 GB RAM pico.
# Runtime con grafo cargado usa ~0.5–1 GB; Railway cobra uso real, no el tope.
[deploy.limitOverride.containers]
memoryBytes = 4294967296
cpu = 2
