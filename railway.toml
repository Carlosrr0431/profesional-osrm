[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
healthcheckPath = "/route/v1/driving/-65.42,-24.78;-65.41,-24.79?overview=false"
healthcheckTimeout = 2400

# osmium extract + osrm-extract necesitan ~1.5–2 GB pico con PBF Argentina.
[deploy.limitOverride.containers]
memoryBytes = 2147483648
cpu = 1
